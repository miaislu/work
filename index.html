<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>光通信与光芯片行业周报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Weekly Intelligence Desk</p>
        <h1>光通信与光芯片行业周报</h1>
        <p class="lede">
          按周追踪光通信、光芯片、BTO、TFLN、器件设计、芯片参数、科研论文与重点公司进展。
        </p>
      </div>
      <div class="header-actions" aria-label="页面操作">
        <button class="icon-button" id="copySummary" title="复制本周摘要" aria-label="复制本周摘要">
          <span aria-hidden="true">⧉</span>
        </button>
        <button class="icon-button" id="downloadJson" title="导出 JSON" aria-label="导出 JSON">
          <span aria-hidden="true">⇩</span>
        </button>
      </div>
    </header>

    <main>
      <section class="control-band" aria-label="查询筛选">
        <label class="field">
          <span>周次</span>
          <select id="weekSelect"></select>
        </label>
        <label class="field search-field">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="材料、公司、论文、参数..." />
        </label>
        <div class="segmented" role="group" aria-label="类别筛选">
          <button class="segment active" data-filter="全部">全部</button>
          <button class="segment" data-filter="科研论文">科研论文</button>
          <button class="segment" data-filter="产业进展">产业进展</button>
          <button class="segment" data-filter="公司动态">公司动态</button>
        </div>
      </section>

      <section class="overview-grid" aria-label="本周概览">
        <article class="metric">
          <span class="metric-label">条目</span>
          <strong id="metricCount">0</strong>
        </article>
        <article class="metric">
          <span class="metric-label">重点材料</span>
          <strong id="metricMaterials">-</strong>
        </article>
        <article class="metric">
          <span class="metric-label">核心主题</span>
          <strong id="metricTheme">-</strong>
        </article>
        <article class="metric">
          <span class="metric-label">更新状态</span>
          <strong id="metricStatus">-</strong>
        </article>
      </section>

      <section class="week-layout">
        <aside class="digest-panel" aria-label="本周研判">
          <div class="panel-heading">
            <p class="eyebrow">Analyst Notes</p>
            <h2 id="weekTitle">本周研判</h2>
          </div>
          <p id="weekSummary"></p>
          <div class="watchlist">
            <h3>下周关注</h3>
            <ul id="watchList"></ul>
          </div>
        </aside>

        <section class="feed" aria-label="进展列表">
          <div class="feed-toolbar">
            <h2>进展明细</h2>
            <span id="resultCount"></span>
          </div>
          <div id="cards" class="cards"></div>
          <p id="emptyState" class="empty-state" hidden>没有匹配条目。换个关键词或类别试试。</p>
        </section>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-topline">
          <span class="badge"></span>
          <span class="date"></span>
        </div>
        <h3></h3>
        <p class="card-summary"></p>
        <dl class="facts"></dl>
        <div class="tags"></div>
        <a class="source" target="_blank" rel="noreferrer">来源</a>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
